<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember Bible Study</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header id="global-header">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search Scripture and notes…" autocomplete="off" />
            <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                <svg id="theme-icon-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <circle cx="10" cy="10" r="4"/>
                    <line x1="10" y1="1" x2="10" y2="3.5"/><line x1="10" y1="16.5" x2="10" y2="19"/>
                    <line x1="1" y1="10" x2="3.5" y2="10"/><line x1="16.5" y1="10" x2="19" y2="10"/>
                    <line x1="3.2" y1="3.2" x2="5" y2="5"/><line x1="15" y1="15" x2="16.8" y2="16.8"/>
                    <line x1="16.8" y1="3.2" x2="15" y2="5"/><line x1="5" y1="15" x2="3.2" y2="16.8"/>
                </svg>
                <svg id="theme-icon-moon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path d="M17.5 11.5A7.5 7.5 0 0 1 8.5 2.5a7.5 7.5 0 1 0 9 9z"/>
                </svg>
            </button>
        </div>
    </header>

    <div id="template-bar" class="hidden"></div>

    <div id="workspace">

        <div id="study-panels">

            <section id="notes-panel">
                <header class="panel-header">
                    <nav id="notes-tabs">
                        <button class="notes-tab active" role="tab" aria-selected="true" data-study-id="all">All Studies</button>
                        <!-- dynamic study tabs rendered by panels.js -->
                        <button id="notes-tab-add" aria-label="New study" title="New study">+</button>
                    </nav>
                    <div class="panel-header-actions">
                        <button id="layout-toggle-btn" aria-label="Toggle panel layout" title="Toggle stacked / side-by-side">⇅</button>
                        <button class="panel-help-btn" aria-label="Notes help">?</button>
                        <button class="panel-settings-btn" aria-label="Notes settings">⚙</button>
                    </div>
                </header>
                <div id="notes-active-view"></div>
                <div id="notes-all-studies-view" class="hidden"></div>
            </section>

            <div id="panel-resize-handle" aria-hidden="true"></div>

            <section id="reference-panel">
                <header class="panel-header">
                    <nav id="reference-tabs" role="tablist">
                        <button class="tab-btn active" role="tab" aria-selected="true" data-tab="info">Info</button>
                        <button class="tab-btn" role="tab" aria-selected="false" data-tab="tags">Tags</button>
                        <button class="tab-btn" role="tab" aria-selected="false" data-tab="related">Related</button>
                        <button class="tab-btn" role="tab" aria-selected="false" data-tab="language">Language</button>
                    </nav>
                    <div class="panel-header-actions">
                        <button class="panel-help-btn" aria-label="Reference help">?</button>
                        <button class="panel-settings-btn" aria-label="Reference settings">⚙</button>
                    </div>
                </header>
                <div id="info-tab" class="tab-content active" role="tabpanel"></div>
                <div id="tags-tab" class="tab-content hidden" role="tabpanel"></div>
                <div id="related-tab" class="tab-content hidden" role="tabpanel"></div>
                <div id="language-tab" class="tab-content hidden" role="tabpanel"></div>
            </section>

        </div>

        <div id="workspace-resize-handle" aria-hidden="true"></div>

        <section id="reader">
            <header id="reader-header">
                <button id="split-toggle-btn" aria-label="Split reader" title="Split reader">
                    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="1.5" y="2.5" width="7" height="15" rx="1"/>
                        <rect x="11.5" y="2.5" width="7" height="15" rx="1"/>
                    </svg>
                </button>
                <div class="reader-header-spacer"></div>
                <button id="bookmark-btn" aria-label="Bookmark this chapter">&#9673;</button>
                <button id="reader-help-btn" aria-label="Reader help">?</button>
                <button id="reader-settings-btn" aria-label="Reader settings">⚙</button>
            </header>
            <div id="reader-body">
                <div class="reader-pane active" id="reader-pane-a">
                    <div class="pane-nav">
                        <button class="pane-book-btn" aria-label="Select book and chapter"></button>
                        <span class="pane-location"></span>
                        <button class="pane-prev" aria-label="Previous chapter">‹</button>
                        <button class="pane-next" aria-label="Next chapter">›</button>
                        <div class="pane-nav-spacer"></div>
                        <span class="translation-label">KJV</span>
                    </div>
                    <div class="pane-content">
                        <div class="scripture-text"></div>
                    </div>
                </div>
                <div id="reader-split-handle" class="hidden" aria-hidden="true"></div>
                <div class="reader-pane hidden" id="reader-pane-b">
                    <div class="pane-nav">
                        <button class="pane-book-btn" aria-label="Select book and chapter"></button>
                        <span class="pane-location"></span>
                        <button class="pane-prev" aria-label="Previous chapter">‹</button>
                        <button class="pane-next" aria-label="Next chapter">›</button>
                        <div class="pane-nav-spacer"></div>
                        <span class="translation-label">KJV</span>
                    </div>
                    <div class="pane-content">
                        <div class="scripture-text"></div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Book/chapter selector overlay -->
    <div id="book-overlay" class="hidden">
        <div id="book-list"></div>
        <div id="chapter-grid" class="hidden"></div>
    </div>

    <!-- Search results overlay -->
    <div id="search-results" class="hidden"></div>

    <!-- PWA install prompt -->
    <div id="install-overlay" class="hidden">
        <div id="install-prompt">
            <p>Install Ember for the full offline experience.</p>
            <button id="install-accept-btn">Install</button>
            <button id="install-dismiss-btn">Not now</button>
        </div>
    </div>

    <!-- Loading screen -->
    <div id="loading">Loading Scripture…</div>

    <script src="js/vendor/sql-wasm.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
